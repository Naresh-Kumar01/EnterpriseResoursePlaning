name: Enterprise Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      test_scope:
        description: "Test scope (all, ui, api)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ui
          - api
      api_environment:
        description: "API environment"
        required: false
        default: "qa"
        type: choice
        options:
          - qa
          - uat
          - prod

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome]
        environment: [dev]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: |
          SCOPE="${{ github.event.inputs.test_scope || 'all' }}"
          API_ENV="${{ github.event.inputs.api_environment || 'qa' }}"
          if [ "$SCOPE" = "api" ]; then
            mvn clean test -Papi-only -Dapi.environment=$API_ENV
          elif [ "$SCOPE" = "ui" ]; then
            mvn clean test -Pui-only -Denvironment=${{ matrix.environment }} -Dbrowser=${{ matrix.browser }} -Dheadless=true
          else
            mvn clean test -Denvironment=${{ matrix.environment }} -Dbrowser=${{ matrix.browser }} -Dheadless=true -Dapi.environment=$API_ENV
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.browser }}
          path: |
            test-output/
            target/cucumber-reports/
            target/surefire-reports/
