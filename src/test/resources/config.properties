# Environment: dev | staging | prod (override via -Denvironment=staging)
environment=dev

# Browser: chrome | firefox | edge | safari
browser=chrome

# Headless mode
headless=false

# URLs per environment
dev.base.url=https://www.logixerp.com/Login?c=TMS
staging.base.url=https://staging.example.com
prod.base.url=https://www.example.com

# Timeouts (seconds)
implicit.wait=10
explicit.wait=20
fluent.wait=20
page.load.timeout=30

# Screenshot & reports
screenshot.on.failure=true
screenshot.path=test-output/screenshots
extent.report.path=test-output/extent-reports
extent.report.name=Logix_Automation_Report

# Retry configuration
retry.count=2

# Test data paths
excel.path=src/test/resources/testdata/testdata.xlsx
json.path=src/test/resources/testdata/testdata.json

# Mobile readiness (Appium endpoint placeholder)
mobile.enabled=false
appium.server.url=http://127.0.0.1:4723

# API base URL (RestAssured)
api.base.url=https://jsonplaceholder.typicode.com

# Valid credentials for tests (can be overridden via -Dvalid.username / -Dvalid.password)
valid.username=Admin
valid.password=logixerp

# Non-existent username for negative sign-in tests
invalid.username=NonExistentUser999

# Invalid password for negative sign-in tests (correct username, wrong password)
invalid.password=WrongPassword123

# Cookie names inspected during auth-failure validation (comma-separated)
auth.cookie.names=authToken,token,Authorization,session
